  <!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerbera Eternal</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

</head>

<body>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_9c9f9a2e54.mp3" type="audio/mp3">
</audio>

<canvas id="particles"></canvas>

<div class="light"></div>

<div class="scene">

<div class="glass">

<svg class="flower" viewBox="0 0 500 600">

<defs>

<radialGradient id="petal">
<stop offset="0%" stop-color="#7a0d1b"/>
<stop offset="60%" stop-color="#4a0810"/>
<stop offset="100%" stop-color="#1c0206"/>
</radialGradient>

<radialGradient id="gold">
<stop offset="0%" stop-color="#f5d798"/>
<stop offset="100%" stop-color="#C5A059"/>
</radialGradient>

<filter id="blurGlow">
<feGaussianBlur stdDeviation="8"/>
</filter>

</defs>

<g id="stem">
<path d="M250 300 C270 420 230 500 250 560"
stroke="#1c231e"
stroke-width="8"
fill="none"
stroke-linecap="round"/>
</g>

<g id="petals"></g>

<circle cx="250" cy="250" r="40" fill="url(#gold)" filter="url(#blurGlow)"/>

</svg>

</div>

<h1 class="text">Con amor, para el amor de mi vida, mi Ximenita</h1>

</div>

<script src="script.js"></script>

</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
